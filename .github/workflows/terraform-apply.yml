name: CI/CD Pipeline - Provisioning AWS Infrastructure with Terraform

on:
  push:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-apply.yml"
    branches:
      - main
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-apply.yml"
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  TF_CL_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_TOKEN }}

jobs:
  plan:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./infra

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ env.TF_CL_API_TOKEN }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

  apply:
    runs-on: ubuntu-latest

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: ./infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ env.TF_CL_API_TOKEN }}
      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        run: |
          echo "BUCKET_NAME=$(terraform output -raw bucket_name)" >> $GITHUB_ENV
          echo "CLOUDFRONT_DISTRIBUTION_ID=$(terraform output -raw cloudfront_distribution_id)" >> $GITHUB_ENV
          echo "URL=https://$(terraform output -raw cloudfront_domain_name)" >> $GITHUB_ENV
      - name: Create Repository Secrets
        run: |
          gh secret set BUCKET_NAME --body "$BUCKET_NAME"
          gh secret set CLOUDFRONT_DISTRIBUTION_ID --body "$CLOUDFRONT_DISTRIBUTION_ID"

      - name: Update Homepage URL
        run: |

          gh api \
          -X PATCH /repos/${{ github.repository }} \
          -f homepage="$URL"
